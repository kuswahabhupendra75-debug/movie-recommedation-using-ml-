services:
  - type: web
    name: cinehybrid-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        # SECURITY: Set this value manually in Render Dashboard > Environment
        # Do NOT put the actual password in this file (it gets committed to Git)
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
